name: nyc-analytics-phase7

services:
  influxdb:
    image: influxdb:2.7
    container_name: nyc-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:           ${INFLUXDB_INIT_MODE:-setup}
      DOCKER_INFLUXDB_INIT_USERNAME:       ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD:       ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG:            ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET:         ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:    ${INFLUXDB_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION:      0s
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: nyc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      INFLUXDB_URL:               ${INFLUXDB_URL}
      INFLUXDB_TOKEN:             ${INFLUXDB_TOKEN}
      INFLUXDB_ORG:               ${INFLUXDB_ORG}
      INFLUXDB_BUCKET:            ${INFLUXDB_BUCKET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy

  app-weather-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: nyc-analytics-app:latest
    container_name: nyc-app-weather-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Container runs an internal sleep loop with this interval (seconds).
      # Unset / 0 means one-shot (useful for `docker compose run --rm app-weather-sync`).
      WEATHER_SYNC_INTERVAL_SECONDS: "3600"
    command: ["python", "-m", "app", "weather-sync"]
    depends_on:
      influxdb:
        condition: service_healthy

  app-bot:
    image: nyc-analytics-app:latest
    container_name: nyc-app-bot
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "app", "bot"]
    # Reuses the image built by app-weather-sync; depends_on ensures the build
    # has happened (`docker compose up` builds before starting the bot).
    depends_on:
      app-weather-sync:
        condition: service_started

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
